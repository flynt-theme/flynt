<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Flynt — Warm color palette</title>
        <meta name="description" content="Warm undertones in dark and light. Amber accents, ten hues at 50% saturation." />
        <meta property="og:title" content="Flynt" />
        <meta property="og:description" content="Warm undertones in dark and light. Amber accents, ten hues at 50% saturation." />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://flynt-theme.github.io/flynt" />
        <meta property="og:image" content="https://flynt-theme.github.io/flynt/assets/flynt-logo.png" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Flynt" />
        <meta name="twitter:description" content="Warm undertones in dark and light. Amber accents, ten hues at 50% saturation." />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #100e0c;
                --bg-2: #1c1916;
                --bg-3: #262220;
                --bg-4: #322f2b;
                --bg-5: #403c38;
                --tx: #f5edd8;
                --tx-2: #d8cebc;
                --tx-3: #a89a88;
                --tx-4: #79685a;
                --tx-5: #584f45;
                --accent: #b4963c;
            }
            [data-theme="light"] {
                --bg: #fffcef;
                --bg-2: #f2edde;
                --bg-3: #e5dfd0;
                --bg-4: #d5cfc0;
                --bg-5: #c0b9aa;
                --tx: #1a1512;
                --tx-2: #3d3228;
                --tx-3: #6a5c4c;
                --tx-4: #8e806f;
                --tx-5: #b2a899;
                --accent: #b4963c;
            }

            body {
                background: var(--bg);
                color: var(--tx-2);
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
                    sans-serif;
                font-size: 15px;
                line-height: 1.6;
            }

            .wrap {
                max-width: 960px;
                margin: 0 auto;
                padding: 52px 32px 96px;
            }

            h1 {
                font-size: 22px;
                font-weight: 600;
                color: var(--tx);
                letter-spacing: -0.01em;
            }

            h2 {
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.12em;
                color: var(--tx-4);
                padding-bottom: 10px;
                border-bottom: 1px solid var(--bg-3);
                margin-bottom: 24px;
            }

            h3 {
                font-size: 13px;
                font-weight: 600;
                color: var(--tx-3);
                margin: 36px 0 12px;
            }
            h3:first-child {
                margin-top: 0;
            }

            p {
                color: var(--tx-3);
                line-height: 1.75;
            }

            a {
                color: var(--accent);
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }

            code {
                font-family: ui-monospace, "SF Mono", Menlo, monospace;
                font-size: 12px;
                background: var(--bg-3);
                color: var(--tx-3);
                padding: 1px 5px;
                border-radius: 3px;
            }

            header {
                margin-bottom: 40px;
            }

            .header-meta {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .tagline {
                font-size: 14px;
                color: var(--tx-4);
            }

            section {
                margin-bottom: 56px;
            }

            .mode-switcher {
                position: fixed;
                bottom: 28px;
                right: 28px;
                background: var(--bg-2);
                border: 1px solid var(--bg-4);
                border-radius: 14px;
                padding: 6px;
                z-index: 100;
                display: flex;
                flex-direction: column;
                gap: 2px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
            }

            .mode-option {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 10px;
                border-radius: 9px;
                cursor: pointer;
                transition: background 0.12s;
            }
            .mode-option:not(.active):hover {
                background: var(--bg-3);
            }
            .mode-option.active {
                cursor: default;
            }

            .mode-label {
                font:
                    600 10px/1 ui-monospace,
                    "SF Mono",
                    Menlo,
                    monospace;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--tx-4);
                width: 30px;
                transition: color 0.12s;
            }
            .mode-option.active .mode-label {
                color: var(--accent);
            }

            .mode-pill {
                display: flex;
                align-items: center;
                gap: 3px;
                padding: 5px 8px;
                border-radius: 100px;
                flex-shrink: 0;
            }

            .pill-dot {
                width: 9px;
                height: 9px;
                border-radius: 50%;
                flex-shrink: 0;
            }

            /* ── Editor preview ──────────────────────────────── */

            .preview-window {
                border-radius: 10px;
                overflow: hidden;
                border: 1px solid var(--bg-3);
                user-select: none;
            }

            .preview-titlebar {
                background: var(--bg-3);
                height: 38px;
                display: flex;
                align-items: flex-end;
                padding: 0 16px 0;
                gap: 0;
                flex-shrink: 0;
            }

            .traffic-lights {
                display: flex;
                gap: 6px;
                align-items: center;
                padding-bottom: 11px;
                flex-shrink: 0;
            }

            .traffic {
                width: 11px;
                height: 11px;
                border-radius: 50%;
            }

            .tab-strip {
                display: flex;
                align-items: flex-end;
                height: 100%;
                margin-left: 16px;
                gap: 2px;
            }

            .preview-tab {
                height: 28px;
                background: var(--bg);
                border-radius: 6px 6px 0 0;
                display: flex;
                align-items: center;
                padding: 0 16px;
                position: relative;
                gap: 8px;
            }

            .preview-tab::after {
                content: "";
                position: absolute;
                bottom: 0;
                left: 8px;
                right: 8px;
                height: 2px;
                background: var(--accent);
                border-radius: 1px 1px 0 0;
            }

            .preview-tab-inactive {
                height: 24px;
                background: var(--bg-2);
                border-radius: 6px 6px 0 0;
                display: flex;
                align-items: center;
                padding: 0 16px;
            }

            .preview-body {
                display: flex;
                height: 300px;
            }

            .preview-sidebar {
                background: var(--bg-2);
                width: 156px;
                flex-shrink: 0;
                border-right: 1px solid var(--bg-3);
                padding: 10px 0;
                overflow: hidden;
            }

            .sidebar-item {
                height: 22px;
                display: flex;
                align-items: center;
            }

            .preview-editor {
                background: var(--bg);
                flex: 1;
                display: flex;
                overflow: hidden;
            }

            .preview-gutter {
                width: 44px;
                flex-shrink: 0;
                padding: 10px 10px 10px 0;
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 0;
                border-right: 1px solid var(--bg-2);
            }

            .gutter-line {
                height: 22px;
                display: flex;
                align-items: center;
                justify-content: flex-end;
            }

            .preview-code {
                flex: 1;
                padding: 10px 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .code-line {
                height: 22px;
                display: flex;
                align-items: center;
                gap: 5px;
                padding: 0 16px;
                flex-shrink: 0;
            }

            .code-line.active {
                background: var(--bg-4);
            }

            .blk {
                height: 7px;
                border-radius: 2px;
                flex-shrink: 0;
            }

            .cursor {
                width: 2px;
                height: 14px;
                background: var(--accent);
                border-radius: 1px;
                flex-shrink: 0;
                animation: blink 1.1s ease-in-out infinite;
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                45%,
                55% {
                    opacity: 0;
                }
            }

            .preview-statusbar {
                background: var(--bg-2);
                height: 22px;
                border-top: 1px solid var(--bg-3);
                display: flex;
                align-items: center;
                padding: 0 14px;
                gap: 10px;
            }

            /* ── Palette swatches ────────────────────────────── */

            .swatch-row {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .swatch {
                cursor: pointer;
                display: flex;
                flex-direction: column;
                gap: 5px;
            }

            .chip {
                width: 56px;
                height: 36px;
                border-radius: 5px;
                transition: transform 0.1s ease;
            }
            .swatch:hover .chip {
                transform: translateY(-2px);
            }

            .chip-name,
            .chip-hex {
                font:
                    11px/1 ui-monospace,
                    "SF Mono",
                    Menlo,
                    monospace;
            }
            .chip-name {
                color: var(--tx-4);
            }
            .chip-hex {
                color: var(--tx-3);
            }

            /* ── Shade grid ──────────────────────────────────── */

            .shade-wrap {
                overflow-x: auto;
            }

            .shade-grid {
                display: grid;
                gap: 3px;
                min-width: 580px;
            }

            .shade-hdr {
                font:
                    10px/1 ui-monospace,
                    "SF Mono",
                    Menlo,
                    monospace;
                color: var(--tx-4);
                text-align: center;
                padding-bottom: 4px;
            }
            .shade-hdr.primary-col {
                color: var(--tx-2);
            }

            .shade-name {
                font:
                    11px/1 ui-monospace,
                    "SF Mono",
                    Menlo,
                    monospace;
                color: var(--tx-4);
                display: flex;
                align-items: center;
                padding-right: 8px;
            }

            .shade-cell {
                height: 34px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.1s ease;
            }
            .shade-cell:hover {
                transform: scale(1.1);
                z-index: 1;
                position: relative;
            }

            .shade-inner {
                border-radius: 3px;
                transition: inherit;
            }
            .shade-cell.primary .shade-inner {
                width: 100%;
                height: 30px;
            }
            .shade-cell:not(.primary) .shade-inner {
                width: 16px;
                height: 16px;
            }

            /* ── Tables ──────────────────────────────────────── */

            table {
                width: 100%;
                border-collapse: collapse;
            }

            thead th {
                font: 11px/1.5 inherit;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.07em;
                color: var(--tx-4);
                text-align: left;
                padding: 0 16px 8px 0;
                border-bottom: 1px solid var(--bg-3);
            }

            td {
                padding: 8px 16px 8px 0;
                border-bottom: 1px solid var(--bg-2);
                vertical-align: middle;
                font-size: 13px;
                color: var(--tx-2);
            }
            td:last-child {
                color: var(--tx-4);
                padding-right: 0;
            }

            .dot {
                display: inline-block;
                width: 9px;
                height: 9px;
                border-radius: 50%;
                margin-right: 7px;
                vertical-align: middle;
                flex-shrink: 0;
            }

            .token-cell {
                display: flex;
                align-items: center;
            }

            .ansi-n {
                font-family: ui-monospace, "SF Mono", Menlo, monospace;
                color: var(--tx-4);
                width: 28px;
            }

            /* ── Toast ───────────────────────────────────────── */

            #toast {
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: var(--bg-4);
                color: var(--tx);
                font:
                    13px/1 ui-monospace,
                    "SF Mono",
                    Menlo,
                    monospace;
                padding: 9px 16px;
                border-radius: 5px;
                opacity: 0;
                transform: translateY(4px);
                transition:
                    opacity 0.15s,
                    transform 0.15s;
                pointer-events: none;
            }
            #toast.show {
                opacity: 1;
                transform: none;
            }

            footer {
                border-top: 1px solid var(--bg-3);
                padding-top: 24px;
                font-size: 13px;
                color: var(--tx-4);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            kbd {
                border: 1px solid var(--bg-5);
                padding: 1px 6px;
                border-radius: 3px;
                font:
                    11px/1.6 ui-monospace,
                    "SF Mono",
                    Menlo,
                    monospace;
                color: var(--tx-4);
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="mode-switcher">
                <div
                    class="mode-option"
                    id="mode-dark"
                    onclick="setTheme('dark')"
                >
                    <span class="mode-label">Dark</span>
                    <div
                        class="mode-pill"
                        id="pill-dark"
                        style="background: #100e0c"
                    ></div>
                </div>
                <div
                    class="mode-option"
                    id="mode-light"
                    onclick="setTheme('light')"
                >
                    <span class="mode-label">Light</span>
                    <div
                        class="mode-pill"
                        id="pill-light"
                        style="background: #fffcef"
                    ></div>
                </div>
            </div>

            <header>
                <div class="header-meta">
                    <div style="display: flex; align-items: center; gap: 12px">
                        <img
                            src="assets/flynt-logo.png"
                            width="36"
                            height="36"
                            alt="Flynt"
                        />
                        <h1>Flynt</h1>
                    </div>
                    <span class="tagline"
                        >Warm undertones, amber accents, ten hues at 50%
                        saturation.</span
                    >
                </div>
            </header>

            <section>
                <h2>Preview</h2>
                <div class="preview-window" id="preview"></div>
            </section>

            <section>
                <h2>Base</h2>
                <div id="base-bg" class="swatch-row"></div>
                <div
                    id="base-tx"
                    class="swatch-row"
                    style="margin-top: 8px"
                ></div>
            </section>

            <section>
                <h2>Accents</h2>
                <div id="accent-row" class="swatch-row"></div>
            </section>

            <section>
                <h2>Extended</h2>
                <div class="shade-wrap">
                    <div id="shade-grid" class="shade-grid"></div>
                </div>
            </section>

            <section>
                <h2>Style Guide</h2>

                <h3>Interface</h3>
                <table id="t-interface"></table>

                <h3>Syntax</h3>
                <table id="t-syntax"></table>

                <h3>Markup</h3>
                <table id="t-markup"></table>

                <h3>Terminal</h3>
                <p style="font-size: 13px; margin-bottom: 16px">
                    Colors 0 and 7 use base tokens. Colors 1-6 map to accent
                    primaries. Brights 9-14 use shade 300.
                </p>
                <table id="t-terminal"></table>
            </section>

            <footer>
                <a href="https://github.com/flynt-theme/flynt">GitHub</a>
                <span>Press <kbd>D</kbd> to toggle theme</span>
            </footer>
        </div>

        <div id="toast" aria-live="polite"></div>

        <script>
            const P = {
                saturation: 50,
                hues: {
                    ember: 5,
                    clay: 23,
                    amber: 45,
                    moss: 75,
                    fern: 105,
                    teal: 175,
                    delft: 208,
                    iris: 258,
                    plum: 328,
                    rose: 345,
                },
                shades: [
                    "50",
                    "100",
                    "150",
                    "200",
                    "300",
                    "400",
                    "500",
                    "600",
                    "700",
                    "800",
                    "850",
                    "900",
                    "950",
                ],
                lightness: {
                    50: 91,
                    100: 87,
                    150: 81,
                    200: 76,
                    300: 64,
                    400: 53,
                    500: 47,
                    600: 42,
                    700: 36,
                    800: 27,
                    850: 21,
                    900: 16,
                    950: 11,
                },
                primaryShade: { dark: "500", light: "500" },
                base: {
                    dark: {
                        bg: "#100E0C",
                        "bg-2": "#1C1916",
                        "bg-3": "#262220",
                        "bg-4": "#322F2B",
                        "bg-5": "#403C38",
                        tx: "#F5EDD8",
                        "tx-2": "#D8CEBC",
                        "tx-3": "#A89A88",
                        "tx-4": "#79685A",
                        "tx-5": "#584F45",
                    },
                    light: {
                        bg: "#FFFCEF",
                        "bg-2": "#F2EDDE",
                        "bg-3": "#E5DFD0",
                        "bg-4": "#D5CFC0",
                        "bg-5": "#C0B9AA",
                        tx: "#1A1512",
                        "tx-2": "#3D3228",
                        "tx-3": "#6A5C4C",
                        "tx-4": "#8E806F",
                        "tx-5": "#B2A899",
                    },
                },
            };

            function hslToHex(h, s, l) {
                s /= 100;
                l /= 100;
                const a = s * Math.min(l, 1 - l);
                const f = (n) => {
                    const k = (n + h / 30) % 12;
                    return Math.round(
                        255 * (l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1)),
                    )
                        .toString(16)
                        .padStart(2, "0");
                };
                return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
            }

            const accents = {};
            for (const [name, hue] of Object.entries(P.hues)) {
                accents[name] = {};
                for (const sh of P.shades)
                    accents[name][sh] = hslToHex(
                        hue,
                        P.saturation,
                        P.lightness[sh],
                    );
            }

            const urlTheme = new URLSearchParams(window.location.search).get(
                "theme",
            );
            let theme =
                urlTheme === "dark" || urlTheme === "light" ? urlTheme : "dark";
            document.documentElement.dataset.theme = theme;

            const base = () => P.base[theme];
            const primary = (name) => accents[name][P.primaryShade[theme]];
            const tokenHex = (token) => base()[token] ?? primary(token);

            function copy(hex) {
                navigator.clipboard?.writeText(hex);
                const el = document.getElementById("toast");
                el.textContent = hex;
                el.classList.add("show");
                clearTimeout(el._t);
                el._t = setTimeout(() => el.classList.remove("show"), 1400);
            }

            // ── Preview ───────────────────────────────────────────

            // Each line is an array of segments: { t: tokenName, w: width } or { cursor: true } or null (blank line).
            // ACTIVE_LINE gets bg-4 highlight.
            const PREVIEW_LINES = [
                [
                    { t: "plum", w: 44 },
                    { t: "plum", w: 8 },
                    { t: "tx-3", w: 36 },
                    { t: "tx-3", w: 8 },
                    { t: "tx-3", w: 30 },
                    { t: "plum", w: 8 },
                    { t: "tx-2", w: 26 },
                    { t: "delft", w: 66 },
                ],
                null,
                [{ t: "clay", w: 72 }],
                [
                    { t: "moss", w: 34 },
                    { t: "tx", w: 66 },
                    { t: "tx-2", w: 40 },
                    { t: "moss", w: 56 },
                    { t: "tx", w: 8 },
                ],
                null,
                [
                    { t: "amber", w: 54 },
                    { t: "tx", w: 8 },
                    { t: "tx-3", w: 52 },
                    { t: "tx", w: 8 },
                    { t: "fern", w: 40 },
                    { t: "tx", w: 8 },
                    { t: "fern", w: 58 },
                    { cursor: true },
                ],
                [
                    { t: "tx-3", w: 36 },
                    { t: "tx-3", w: 24 },
                    { t: "rose", w: 8 },
                    { t: "delft", w: 38 },
                    { t: "iris", w: 8 },
                    { t: "tx-3", w: 16 },
                    { t: "iris", w: 8 },
                    { t: "delft", w: 14 },
                ],
                [
                    { t: "tx-3", w: 36 },
                    { t: "tx-3", w: 22 },
                    { t: "rose", w: 8 },
                    { t: "tx-2", w: 34 },
                    { t: "amber", w: 38 },
                    { t: "tx", w: 8 },
                    { t: "tx-3", w: 22 },
                    { t: "tx", w: 8 },
                ],
                [
                    { t: "tx-2", w: 14 },
                    { t: "tx", w: 8 },
                    { t: "tx-3", w: 22 },
                    { t: "tx-4", w: 36 },
                    { t: "rose", w: 24 },
                    { t: "teal", w: 24 },
                    { t: "tx", w: 8 },
                    { t: "tx", w: 8 },
                ],
                [
                    { t: "plum", w: 34 },
                    { t: "tx-2", w: 22 },
                    { t: "moss", w: 36 },
                    { t: "tx", w: 8 },
                    { t: "delft", w: 58 },
                    { t: "tx", w: 8 },
                ],
                [{ t: "tx", w: 8 }],
                [{ t: "tx-5", w: 130 }],
                [
                    { t: "plum", w: 40 },
                    { t: "tx-3", w: 22 },
                    { t: "tx", w: 8 },
                    { t: "amber", w: 30 },
                    { t: "tx", w: 8 },
                    { t: "tx", w: 8 },
                    { t: "tx-2", w: 16 },
                    { t: "fern", w: 34 },
                ],
                [{ t: "tx", w: 8 }],
            ];
            const ACTIVE_LINE = 5;

            const SIDEBAR_ITEMS = [
                { t: "tx-3", w: 60, indent: 0 },
                { t: "tx-4", w: 52, indent: 1 },
                { t: "tx-2", w: 56, indent: 1 },
                { t: "tx-4", w: 44, indent: 1 },
                { t: "tx-3", w: 56, indent: 0 },
                { t: "tx-4", w: 48, indent: 1 },
                { t: "tx-4", w: 38, indent: 1 },
                { t: "tx-3", w: 36, indent: 0 },
                { t: "tx-4", w: 40, indent: 1 },
            ];

            const GUTTER_WS = [
                14, 14, 14, 14, 14, 14, 14, 14, 14, 14, 14, 14, 14, 14,
            ];

            function renderPreview() {
                const b = base();
                const win = document.getElementById("preview");

                const sidebar = SIDEBAR_ITEMS.map(
                    ({ t, w, indent }) =>
                        `<div class="sidebar-item" style="padding-left:${12 + indent * 14}px">
      <div class="blk" style="background:${b[t]};width:${w}px"></div>
    </div>`,
                ).join("");

                const gutter = PREVIEW_LINES.map(
                    (_, i) =>
                        `<div class="gutter-line">
      <div class="blk" style="background:${b["tx-4"]};width:${GUTTER_WS[i] || 14}px;height:6px"></div>
    </div>`,
                ).join("");

                const lines = PREVIEW_LINES.map((segs, i) => {
                    const cls =
                        i === ACTIVE_LINE ? "code-line active" : "code-line";
                    if (!segs) return `<div class="${cls}"></div>`;
                    const blocks = segs
                        .map((s) =>
                            s.cursor
                                ? `<div class="cursor"></div>`
                                : `<div class="blk" style="background:${tokenHex(s.t)};width:${s.w}px"></div>`,
                        )
                        .join("");
                    return `<div class="${cls}">${blocks}</div>`;
                }).join("");

                const pri = P.primaryShade[theme];

                win.innerHTML = `
    <div class="preview-titlebar">
      <div class="traffic-lights">
        <div class="traffic" style="background:${accents.ember[pri]}"></div>
        <div class="traffic" style="background:${accents.amber[pri]}"></div>
        <div class="traffic" style="background:${accents.moss[pri]}"></div>
      </div>
      <div class="tab-strip">
        <div class="preview-tab">
          <div class="blk" style="background:${b["tx-3"]};width:54px;height:6px"></div>
          <div class="blk" style="background:${b["tx-4"]};width:10px;height:6px"></div>
        </div>
        <div class="preview-tab-inactive">
          <div class="blk" style="background:${b["tx-4"]};width:48px;height:6px"></div>
        </div>
      </div>
    </div>
    <div class="preview-body">
      <div class="preview-sidebar">${sidebar}</div>
      <div class="preview-editor">
        <div class="preview-gutter">${gutter}</div>
        <div class="preview-code">${lines}</div>
      </div>
    </div>
    <div class="preview-statusbar">
      <div class="blk" style="background:${primary("amber")};width:38px;height:6px"></div>
      <div class="blk" style="background:${b["tx-4"]};width:54px;height:6px"></div>
      <div class="blk" style="background:${b["tx-4"]};width:42px;height:6px"></div>
    </div>
  `;
            }

            // ── Swatches ──────────────────────────────────────────

            function makeSwatch(name, hex) {
                const el = document.createElement("div");
                el.className = "swatch";
                el.title = `${name}: ${hex} - click to copy`;
                el.onclick = () => copy(hex);
                el.innerHTML = `<div class="chip" style="background:${hex}"></div><div class="chip-name">${name}</div><div class="chip-hex">${hex}</div>`;
                return el;
            }

            function renderBase() {
                const b = base();
                const bgEl = document.getElementById("base-bg");
                const txEl = document.getElementById("base-tx");
                bgEl.innerHTML = txEl.innerHTML = "";
                ["bg", "bg-2", "bg-3", "bg-4", "bg-5"].forEach((k) =>
                    bgEl.appendChild(makeSwatch(k, b[k])),
                );
                ["tx", "tx-2", "tx-3", "tx-4", "tx-5"].forEach((k) =>
                    txEl.appendChild(makeSwatch(k, b[k])),
                );
            }

            function renderAccents() {
                const row = document.getElementById("accent-row");
                row.innerHTML = "";
                for (const name of Object.keys(P.hues))
                    row.appendChild(makeSwatch(name, primary(name)));
            }

            // ── Shade grid ────────────────────────────────────────

            function renderExtended() {
                const grid = document.getElementById("shade-grid");
                grid.innerHTML = "";
                const pri = P.primaryShade[theme];
                grid.style.gridTemplateColumns = `52px repeat(${P.shades.length}, 1fr)`;

                grid.appendChild(document.createElement("div"));
                for (const sh of P.shades) {
                    const el = document.createElement("div");
                    el.className =
                        "shade-hdr" + (sh === pri ? " primary-col" : "");
                    el.textContent = sh;
                    grid.appendChild(el);
                }

                for (const [name, shades] of Object.entries(accents)) {
                    const lbl = document.createElement("div");
                    lbl.className = "shade-name";
                    lbl.textContent = name;
                    grid.appendChild(lbl);

                    for (const sh of P.shades) {
                        const hex = shades[sh];
                        const cell = document.createElement("div");
                        cell.className =
                            "shade-cell" + (sh === pri ? " primary" : "");
                        cell.title = `${name}-${sh}: ${hex}`;
                        cell.onclick = () => copy(hex);
                        const inner = document.createElement("div");
                        inner.className = "shade-inner";
                        inner.style.background = hex;
                        cell.appendChild(inner);
                        grid.appendChild(cell);
                    }
                }
            }

            // ── Style guide ───────────────────────────────────────

            const THEAD = `<thead><tr><th>Role</th><th>Token</th><th>Intent</th></tr></thead>`;

            function guideRow(r) {
                const hex = tokenHex(r.token);
                return `<tr>
    <td>${r.role}</td>
    <td><span class="token-cell"><span class="dot" style="background:${hex}"></span><code>${r.token}</code></span></td>
    <td>${r.intent}</td>
  </tr>`;
            }

            const GUIDE = {
                interface: [
                    {
                        role: "Accent",
                        token: "amber",
                        intent: "Primary interactive - focused borders, active tabs, cursor",
                    },
                    {
                        role: "Error",
                        token: "ember",
                        intent: "Errors, failed validation, destructive states",
                    },
                    {
                        role: "Warning",
                        token: "clay",
                        intent: "Warnings, deprecations, recoverable issues",
                    },
                    {
                        role: "Success",
                        token: "moss",
                        intent: "Confirmations, passing tests, added diffs",
                    },
                ],
                syntax: [
                    {
                        role: "Keyword",
                        token: "tx-2",
                        intent: "Reserved words - body-text weight, not colorized",
                    },
                    {
                        role: "Operator",
                        token: "rose",
                        intent: "Mathematical and logical operators",
                    },
                    {
                        role: "String",
                        token: "delft",
                        intent: "String literals and quoted content",
                    },
                    {
                        role: "String escape",
                        token: "iris",
                        intent: "Escape sequences inside strings",
                    },
                    {
                        role: "Number",
                        token: "teal",
                        intent: "Numeric literals",
                    },
                    {
                        role: "Regex",
                        token: "iris",
                        intent: "Regular expressions",
                    },
                    {
                        role: "Function",
                        token: "amber",
                        intent: "Function names at definition and call sites",
                    },
                    {
                        role: "Parameter",
                        token: "tx-2",
                        intent: "Function parameters - neutral weight",
                    },
                    {
                        role: "Variable",
                        token: "tx-3",
                        intent: "Variables and general identifiers",
                    },
                    {
                        role: "Property",
                        token: "tx-4",
                        intent: "Object keys, struct fields - deliberately dim",
                    },
                    {
                        role: "Type",
                        token: "fern",
                        intent: "Built-in type names",
                    },
                    {
                        role: "Class",
                        token: "moss",
                        intent: "User-defined class and type declarations",
                    },
                    {
                        role: "Decorator",
                        token: "clay",
                        intent: "Decorators and annotations",
                    },
                    {
                        role: "Namespace",
                        token: "plum",
                        intent: "Module and namespace qualifiers",
                    },
                    {
                        role: "Comment",
                        token: "tx-5",
                        intent: "Comments - very faint, intentionally recedes",
                    },
                    {
                        role: "Punctuation",
                        token: "tx",
                        intent: "Braces, brackets, delimiters - full contrast",
                    },
                ],
                markup: [
                    {
                        role: "Heading",
                        token: "amber",
                        intent: "Document headings",
                    },
                    { role: "Bold", token: "tx", intent: "Bold emphasis" },
                    {
                        role: "Italic",
                        token: "tx-2",
                        intent: "Italic emphasis",
                    },
                    {
                        role: "Link text",
                        token: "delft",
                        intent: "The display label of a link",
                    },
                    {
                        role: "Link URL",
                        token: "teal",
                        intent: "The destination URL",
                    },
                    {
                        role: "Code",
                        token: "moss",
                        intent: "Inline code and fenced blocks",
                    },
                    {
                        role: "Blockquote",
                        token: "tx-5",
                        intent: "Quoted passages",
                    },
                    {
                        role: "List marker",
                        token: "rose",
                        intent: "Bullet points and list markers",
                    },
                ],
            };

            function renderGuide() {
                ["interface", "syntax", "markup"].forEach((k) => {
                    document.getElementById(`t-${k}`).innerHTML =
                        THEAD +
                        `<tbody>${GUIDE[k].map(guideRow).join("")}</tbody>`;
                });
                renderTerminal();
            }

            // ── Terminal ──────────────────────────────────────────

            const ANSI = [
                { n: 0, name: "black", token: "bg-2" },
                { n: 1, name: "red", token: "ember" },
                { n: 2, name: "green", token: "moss" },
                { n: 3, name: "yellow", token: "amber" },
                { n: 4, name: "blue", token: "delft" },
                { n: 5, name: "magenta", token: "plum" },
                { n: 6, name: "cyan", token: "teal" },
                { n: 7, name: "white", token: "tx-2" },
                { n: 8, name: "bright black", token: "bg-5" },
                { n: 9, name: "bright red", token: "ember", shade: "300" },
                { n: 10, name: "bright green", token: "moss", shade: "300" },
                { n: 11, name: "bright yellow", token: "amber", shade: "300" },
                { n: 12, name: "bright blue", token: "delft", shade: "300" },
                { n: 13, name: "bright magenta", token: "plum", shade: "300" },
                { n: 14, name: "bright cyan", token: "teal", shade: "300" },
                { n: 15, name: "bright white", token: "tx" },
            ];

            function ansiHex(e) {
                const b = base();
                if (b[e.token]) return b[e.token];
                if (e.shade) return accents[e.token][e.shade];
                return primary(e.token);
            }

            function renderTerminal() {
                const rows = ANSI.map((e) => {
                    const hex = ansiHex(e);
                    const label = e.shade ? `${e.token}-${e.shade}` : e.token;
                    return `<tr>
      <td class="ansi-n">${e.n}</td>
      <td>${e.name}</td>
      <td><span class="token-cell"><span class="dot" style="background:${hex}"></span><code>${label}</code></span></td>
      <td style="font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px">${hex}</td>
    </tr>`;
                }).join("");

                document.getElementById("t-terminal").innerHTML =
                    `<thead><tr><th>#</th><th>Name</th><th>Token</th><th>Hex</th></tr></thead><tbody>${rows}</tbody>`;
            }

            // ── Theme switcher pills ──────────────────────────────

            function renderSwitcher() {
                ["dark", "light"].forEach((t) => {
                    const pill = document.getElementById(`pill-${t}`);
                    const option = document.getElementById(`mode-${t}`);
                    const pri = P.primaryShade[t];
                    pill.innerHTML = "";
                    for (const name of Object.keys(P.hues)) {
                        const dot = document.createElement("div");
                        dot.className = "pill-dot";
                        dot.style.background = accents[name][pri];
                        pill.appendChild(dot);
                    }
                    option.classList.toggle("active", t === theme);
                });
            }

            // ── Render & init ─────────────────────────────────────

            function render() {
                renderSwitcher();
                renderPreview();
                renderBase();
                renderAccents();
                renderExtended();
                renderGuide();
            }

            function setTheme(t) {
                theme = t;
                document.documentElement.dataset.theme = theme;
                render();
            }

            document.addEventListener("keydown", (e) => {
                if (
                    (e.key === "d" || e.key === "D") &&
                    !e.metaKey &&
                    !e.ctrlKey
                )
                    setTheme(theme === "dark" ? "light" : "dark");
            });

            render();
        </script>
    </body>
</html>
